default_install_hook_types:
  - pre-commit

repos:
  - repo: local
    hooks:
      - id: gofmt
        name: gofmt
        entry: gofmt -w
        language: system
        files: ^backend/.*\.go$
        stages:
          - pre-commit
      
      - id: frontend-lint
        name: frontend lint
        entry: bash -c "cd frontend && npm run lint"
        language: system
        files: ^frontend/
        pass_filenames: false
        stages:
          - pre-commit

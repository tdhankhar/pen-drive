basePath: /
definitions:
  github_com_abhishek_pen-drive_backend_internal_api_dto.AuthResponse:
    properties:
      tokens:
        $ref: '#/definitions/github_com_abhishek_pen-drive_backend_internal_api_dto.TokenPair'
      user:
        $ref: '#/definitions/github_com_abhishek_pen-drive_backend_internal_api_dto.AuthenticatedUser'
    type: object
  github_com_abhishek_pen-drive_backend_internal_api_dto.AuthenticatedUser:
    properties:
      email:
        example: user@example.com
        type: string
      id:
        example: 01kki6wb2vqqw4x63mw9bjw6y4
        type: string
    type: object
  github_com_abhishek_pen-drive_backend_internal_api_dto.CredentialsRequest:
    properties:
      email:
        example: user@example.com
        type: string
      password:
        example: Password123!
        type: string
    type: object
  github_com_abhishek_pen-drive_backend_internal_api_dto.DeleteResponse:
    properties:
      deleted_paths:
        example:
        - docs/report.pdf
        items:
          type: string
        type: array
    type: object
  github_com_abhishek_pen-drive_backend_internal_api_dto.DuplicateConflictPolicy:
    enum:
    - reject
    - rename
    - replace
    type: string
    x-enum-varnames:
    - DuplicateConflictPolicyReject
    - DuplicateConflictPolicyRename
    - DuplicateConflictPolicyReplace
  github_com_abhishek_pen-drive_backend_internal_api_dto.DuplicatePreviewItem:
    properties:
      conflict:
        example: true
        type: boolean
      existing_path:
        example: uploads/docs/report.pdf
        type: string
      rename_path:
        example: uploads/docs/report_(1).pdf
        type: string
      requested_path:
        example: uploads/docs/report.pdf
        type: string
    type: object
  github_com_abhishek_pen-drive_backend_internal_api_dto.DuplicatePreviewRequest:
    properties:
      filename:
        example: report.pdf
        type: string
      path:
        example: uploads/docs
        type: string
      relative_paths:
        example:
        - reports/q1/report.pdf
        items:
          type: string
        type: array
    type: object
  github_com_abhishek_pen-drive_backend_internal_api_dto.DuplicatePreviewResponse:
    properties:
      has_conflicts:
        example: true
        type: boolean
      impacted_paths:
        example:
        - uploads/docs/report.pdf
        items:
          type: string
        type: array
      items:
        items:
          $ref: '#/definitions/github_com_abhishek_pen-drive_backend_internal_api_dto.DuplicatePreviewItem'
        type: array
    type: object
  github_com_abhishek_pen-drive_backend_internal_api_dto.ErrorPayload:
    properties:
      code:
        example: invalid_request
        type: string
      message:
        example: request body is invalid
        type: string
    type: object
  github_com_abhishek_pen-drive_backend_internal_api_dto.ErrorResponse:
    properties:
      error:
        $ref: '#/definitions/github_com_abhishek_pen-drive_backend_internal_api_dto.ErrorPayload'
    type: object
  github_com_abhishek_pen-drive_backend_internal_api_dto.FileListResponse:
    properties:
      entries:
        items:
          $ref: '#/definitions/github_com_abhishek_pen-drive_backend_internal_api_dto.FileSystemEntry'
        type: array
      has_more:
        example: false
        type: boolean
      next_continuation_token:
        example: token-123
        type: string
      path:
        example: docs
        type: string
    type: object
  github_com_abhishek_pen-drive_backend_internal_api_dto.FileSystemEntry:
    properties:
      last_modified:
        example: "2026-03-12T16:00:00Z"
        type: string
      name:
        example: photo.jpg
        type: string
      path:
        example: photos/photo.jpg
        type: string
      size:
        example: 2048
        type: integer
      type:
        example: file
        type: string
    type: object
  github_com_abhishek_pen-drive_backend_internal_api_dto.FileUploadResponse:
    properties:
      file:
        $ref: '#/definitions/github_com_abhishek_pen-drive_backend_internal_api_dto.UploadedFileInfo'
    type: object
  github_com_abhishek_pen-drive_backend_internal_api_dto.FolderUploadResponse:
    properties:
      files:
        items:
          $ref: '#/definitions/github_com_abhishek_pen-drive_backend_internal_api_dto.UploadedFileInfo'
        type: array
    type: object
  github_com_abhishek_pen-drive_backend_internal_api_dto.MultipartCompletedPart:
    properties:
      etag:
        example: '"etag-value"'
        type: string
      part_number:
        example: 1
        type: integer
    type: object
  github_com_abhishek_pen-drive_backend_internal_api_dto.MultipartUploadAbortRequest:
    properties:
      key:
        example: uploads/videos/video.mp4
        type: string
      upload_id:
        example: upload-id
        type: string
    type: object
  github_com_abhishek_pen-drive_backend_internal_api_dto.MultipartUploadCompleteRequest:
    properties:
      key:
        example: uploads/videos/video.mp4
        type: string
      parts:
        items:
          $ref: '#/definitions/github_com_abhishek_pen-drive_backend_internal_api_dto.MultipartCompletedPart'
        type: array
      upload_id:
        example: upload-id
        type: string
    type: object
  github_com_abhishek_pen-drive_backend_internal_api_dto.MultipartUploadInitiateRequest:
    properties:
      conflict_policy:
        allOf:
        - $ref: '#/definitions/github_com_abhishek_pen-drive_backend_internal_api_dto.DuplicateConflictPolicy'
        example: reject
      content_type:
        example: video/mp4
        type: string
      filename:
        example: video.mp4
        type: string
      path:
        example: uploads/videos
        type: string
      size:
        example: 7340032
        type: integer
    type: object
  github_com_abhishek_pen-drive_backend_internal_api_dto.MultipartUploadInitiateResponse:
    properties:
      key:
        example: uploads/videos/video.mp4
        type: string
      name:
        example: video.mp4
        type: string
      part_size:
        example: 5242880
        type: integer
      upload_id:
        example: upload-id
        type: string
    type: object
  github_com_abhishek_pen-drive_backend_internal_api_dto.MultipartUploadPartResponse:
    properties:
      etag:
        example: '"etag-value"'
        type: string
      part_number:
        example: 1
        type: integer
    type: object
  github_com_abhishek_pen-drive_backend_internal_api_dto.TokenPair:
    properties:
      access_token:
        example: eyJhbGciOiJIUzI1NiJ9
        type: string
      access_token_expires_at:
        example: "2026-03-12T16:00:00Z"
        type: string
    type: object
  github_com_abhishek_pen-drive_backend_internal_api_dto.UploadedFileInfo:
    properties:
      name:
        example: document.pdf
        type: string
      path:
        example: uploads/document.pdf
        type: string
      size:
        example: 1024576
        type: integer
      uploaded_at:
        example: "2026-03-12T16:00:00Z"
        type: string
    type: object
info:
  contact: {}
  description: pen-drive backend API
  title: pen-drive API
  version: 0.1.0
paths:
  /api/v1/auth/login:
    post:
      consumes:
      - application/json
      description: Authenticate a user and issue auth tokens.
      parameters:
      - description: Login payload
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/github_com_abhishek_pen-drive_backend_internal_api_dto.CredentialsRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_abhishek_pen-drive_backend_internal_api_dto.AuthResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_abhishek_pen-drive_backend_internal_api_dto.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_abhishek_pen-drive_backend_internal_api_dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_abhishek_pen-drive_backend_internal_api_dto.ErrorResponse'
      summary: Log in
      tags:
      - auth
  /api/v1/auth/refresh:
    post:
      description: Rotate the refresh token cookie and issue a new access token.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_abhishek_pen-drive_backend_internal_api_dto.AuthResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_abhishek_pen-drive_backend_internal_api_dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_abhishek_pen-drive_backend_internal_api_dto.ErrorResponse'
      summary: Refresh tokens
      tags:
      - auth
  /api/v1/auth/signup:
    post:
      consumes:
      - application/json
      description: Create a user, provision a bucket, and issue auth tokens.
      parameters:
      - description: Signup payload
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/github_com_abhishek_pen-drive_backend_internal_api_dto.CredentialsRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/github_com_abhishek_pen-drive_backend_internal_api_dto.AuthResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_abhishek_pen-drive_backend_internal_api_dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_abhishek_pen-drive_backend_internal_api_dto.ErrorResponse'
      summary: Sign up
      tags:
      - auth
  /api/v1/files:
    delete:
      description: Soft-delete a file or folder tree by moving the object(s) to trash/<original-path>
      parameters:
      - description: Relative file or folder path
        in: query
        name: path
        required: true
        type: string
      - description: 'Entry type: file or folder'
        in: query
        name: type
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_abhishek_pen-drive_backend_internal_api_dto.DeleteResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_abhishek_pen-drive_backend_internal_api_dto.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_abhishek_pen-drive_backend_internal_api_dto.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/github_com_abhishek_pen-drive_backend_internal_api_dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_abhishek_pen-drive_backend_internal_api_dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Delete file or folder
      tags:
      - files
    get:
      description: List folders and files under the authenticated user's bucket path.
      parameters:
      - description: Relative folder path
        in: query
        name: path
        type: string
      - description: Continuation token from previous page
        in: query
        name: continuation_token
        type: string
      - description: Max keys to request from S3-compatible storage
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_abhishek_pen-drive_backend_internal_api_dto.FileListResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_abhishek_pen-drive_backend_internal_api_dto.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_abhishek_pen-drive_backend_internal_api_dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_abhishek_pen-drive_backend_internal_api_dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: List files
      tags:
      - files
  /api/v1/files/duplicates/preview:
    post:
      consumes:
      - application/json
      description: Preview impacted files and rename targets before uploading a file
        or folder
      parameters:
      - description: Duplicate preview payload
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/github_com_abhishek_pen-drive_backend_internal_api_dto.DuplicatePreviewRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_abhishek_pen-drive_backend_internal_api_dto.DuplicatePreviewResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_abhishek_pen-drive_backend_internal_api_dto.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_abhishek_pen-drive_backend_internal_api_dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_abhishek_pen-drive_backend_internal_api_dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Preview duplicate conflicts
      tags:
      - files
  /api/v1/files/upload:
    post:
      consumes:
      - multipart/form-data
      description: Upload a single file to a destination path in the user's bucket
      parameters:
      - description: File to upload
        in: formData
        name: file
        required: true
        type: file
      - description: Destination path within bucket
        in: formData
        name: path
        type: string
      - description: Override filename
        in: formData
        name: filename
        type: string
      - description: 'Duplicate conflict policy: reject, rename, replace'
        in: formData
        name: conflict_policy
        type: string
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/github_com_abhishek_pen-drive_backend_internal_api_dto.FileUploadResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_abhishek_pen-drive_backend_internal_api_dto.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_abhishek_pen-drive_backend_internal_api_dto.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/github_com_abhishek_pen-drive_backend_internal_api_dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_abhishek_pen-drive_backend_internal_api_dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Upload file
      tags:
      - files
  /api/v1/files/upload-folder:
    post:
      consumes:
      - multipart/form-data
      description: Upload multiple files to a destination folder in the user's bucket,
        preserving relative paths
      parameters:
      - description: Files to upload (repeated)
        in: formData
        name: files
        required: true
        type: file
      - description: Relative path for each file (repeated, must match files count)
        in: formData
        name: relative_paths
        required: true
        type: string
      - description: Destination folder path within bucket
        in: formData
        name: path
        type: string
      - description: 'Duplicate conflict policy: reject, rename, replace'
        in: formData
        name: conflict_policy
        type: string
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/github_com_abhishek_pen-drive_backend_internal_api_dto.FolderUploadResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_abhishek_pen-drive_backend_internal_api_dto.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_abhishek_pen-drive_backend_internal_api_dto.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/github_com_abhishek_pen-drive_backend_internal_api_dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_abhishek_pen-drive_backend_internal_api_dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Upload folder
      tags:
      - files
  /api/v1/files/upload-multipart/abort:
    post:
      consumes:
      - application/json
      description: Abort an in-flight multipart upload and clean up uploaded parts
      parameters:
      - description: Multipart abort payload
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/github_com_abhishek_pen-drive_backend_internal_api_dto.MultipartUploadAbortRequest'
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_abhishek_pen-drive_backend_internal_api_dto.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_abhishek_pen-drive_backend_internal_api_dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_abhishek_pen-drive_backend_internal_api_dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Abort multipart upload
      tags:
      - files
  /api/v1/files/upload-multipart/complete:
    post:
      consumes:
      - application/json
      description: Complete an S3 multipart upload after all parts are uploaded
      parameters:
      - description: Multipart complete payload
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/github_com_abhishek_pen-drive_backend_internal_api_dto.MultipartUploadCompleteRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/github_com_abhishek_pen-drive_backend_internal_api_dto.FileUploadResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_abhishek_pen-drive_backend_internal_api_dto.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_abhishek_pen-drive_backend_internal_api_dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_abhishek_pen-drive_backend_internal_api_dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Complete multipart upload
      tags:
      - files
  /api/v1/files/upload-multipart/initiate:
    post:
      consumes:
      - application/json
      description: Start an S3 multipart upload for a file larger than 5 MB via the
        backend
      parameters:
      - description: Multipart upload payload
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/github_com_abhishek_pen-drive_backend_internal_api_dto.MultipartUploadInitiateRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/github_com_abhishek_pen-drive_backend_internal_api_dto.MultipartUploadInitiateResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_abhishek_pen-drive_backend_internal_api_dto.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_abhishek_pen-drive_backend_internal_api_dto.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/github_com_abhishek_pen-drive_backend_internal_api_dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_abhishek_pen-drive_backend_internal_api_dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Initiate multipart upload
      tags:
      - files
  /api/v1/files/upload-multipart/part:
    post:
      consumes:
      - multipart/form-data
      description: Upload one multipart chunk through the backend into object storage
      parameters:
      - description: Multipart upload id
        in: formData
        name: upload_id
        required: true
        type: string
      - description: Final object key
        in: formData
        name: key
        required: true
        type: string
      - description: Part number
        in: formData
        name: part_number
        required: true
        type: integer
      - description: Multipart chunk payload
        in: formData
        name: part
        required: true
        type: file
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_abhishek_pen-drive_backend_internal_api_dto.MultipartUploadPartResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_abhishek_pen-drive_backend_internal_api_dto.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_abhishek_pen-drive_backend_internal_api_dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_abhishek_pen-drive_backend_internal_api_dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Upload multipart chunk
      tags:
      - files
  /api/v1/me:
    get:
      description: Return the authenticated user from the access token.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_abhishek_pen-drive_backend_internal_api_dto.AuthenticatedUser'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_abhishek_pen-drive_backend_internal_api_dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Current user
      tags:
      - auth
schemes:
- http
- https
securityDefinitions:
  BearerAuth:
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
